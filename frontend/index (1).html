<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics Q&A Agent</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 820px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #1a1d27;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid #2d3147;
      background: #13151f;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, #4f6ef7, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .topbar-title { font-size: 15px; font-weight: 600; color: #f0f4ff; }
    .topbar-sub   { font-size: 12px; color: #6b7280; margin-top: 1px; }
    .pill {
      font-size: 11px; padding: 3px 10px; border-radius: 20px;
      background: #1a2e1a; color: #4ade80; border: 1px solid #166534;
      font-weight: 500;
    }

    /* ── Chat feed ── */
    .feed {
      flex: 1; overflow-y: auto; padding: 20px 20px 10px;
      display: flex; flex-direction: column; gap: 18px;
      scroll-behavior: smooth;
    }
    .feed::-webkit-scrollbar { width: 4px; }
    .feed::-webkit-scrollbar-track { background: transparent; }
    .feed::-webkit-scrollbar-thumb { background: #2d3147; border-radius: 2px; }

    /* ── Messages ── */
    .msg { display: flex; flex-direction: column; }
    .msg.user  { align-items: flex-end; }
    .msg.agent { align-items: flex-start; }

    .bubble {
      max-width: 88%;
      padding: 11px 15px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }
    .user  .bubble { background: #4f6ef7; color: #fff; border-bottom-right-radius: 4px; }
    .agent .bubble {
      background: #21253a; color: #d1d5db;
      border: 1px solid #2d3147; border-bottom-left-radius: 4px;
    }

    .meta {
      margin-top: 5px;
      font-size: 11px; color: #4b5563;
      display: flex; align-items: center; gap: 8px; padding: 0 4px;
    }
    .badge {
      padding: 1px 7px; border-radius: 10px; font-size: 10px;
      font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .badge-type   { background:#1e2a4a; color:#818cf8; border:1px solid #312e81; }
    .badge-cache  { background:#2d2200; color:#fbbf24; border:1px solid #92400e; }
    .badge-ok     { color:#4ade80; font-size:11px; }
    .badge-warn   { color:#f59e0b; font-size:11px; }
    .badge-err    { background:#2d0f0f; color:#f87171; border:1px solid #7f1d1d; }

    /* ── SQL block ── */
    .sql-toggle {
      font-size:11px; color:#818cf8; background:none; border:none;
      cursor:pointer; padding:5px 0 0; text-decoration:underline;
      text-underline-offset:2px; font-family:inherit;
    }
    .sql-block {
      font-family: 'Courier New', monospace; font-size: 11.5px;
      background: #0f1117; border: 1px solid #2d3147;
      border-radius: 8px; padding: 10px 12px; margin-top: 6px;
      color: #a5b4fc; white-space: pre-wrap; word-break: break-all;
      overflow-x: auto;
    }

    /* ── Chart ── */
    .chart-wrap {
      margin-top: 12px; border: 1px solid #2d3147;
      border-radius: 10px; overflow: hidden;
      background: #13151f; padding: 10px;
    }
    .chart-wrap canvas { max-height: 200px; }

    /* ── Data table ── */
    .tbl-wrap { overflow-x:auto; margin-top:10px; border-radius:8px; border:1px solid #2d3147; }
    table { width:100%; border-collapse:collapse; font-size:12px; }
    thead tr { background:#13151f; }
    th { padding:7px 10px; text-align:left; color:#6b7280; font-weight:500;
         border-bottom:1px solid #2d3147; white-space:nowrap; }
    td { padding:7px 10px; border-bottom:1px solid #1e2133; color:#d1d5db; }
    tr:last-child td { border-bottom:none; }

    /* ── Clarify box ── */
    .clarify {
      margin-top:10px; background:#1f1800; border:1px solid #92400e;
      border-radius:8px; padding:10px 12px;
    }
    .clarify-title { font-size:12px; font-weight:600; color:#fbbf24; margin-bottom:6px; }
    .clarify-q {
      font-size:12px; color:#d1d5db; padding:3px 0 3px 10px;
      border-left:2px solid #92400e; margin-bottom:4px;
    }

    /* ── Suggestion chips ── */
    .chips { display:flex; flex-wrap:wrap; gap:7px; margin-top:12px; }
    .chip {
      font-size:12px; padding:5px 12px; border-radius:20px;
      border:1px solid #2d3147; background:#13151f;
      color:#9ca3af; cursor:pointer; transition:all 0.15s;
    }
    .chip:hover { background:#21253a; color:#e2e8f0; border-color:#4f6ef7; }

    /* ── Typing indicator ── */
    .typing { display:flex; align-items:center; gap:4px; padding:4px 0; }
    .dot {
      width:7px; height:7px; border-radius:50%; background:#4b5563;
      animation: bounce 1s infinite;
    }
    .dot:nth-child(2){ animation-delay:.2s; }
    .dot:nth-child(3){ animation-delay:.4s; }
    @keyframes bounce {
      0%,80%,100%{ transform:translateY(0); }
      40%{ transform:translateY(-6px); }
    }

    /* ── Input row ── */
    .input-row {
      display:flex; gap:10px; padding:14px 20px;
      border-top:1px solid #2d3147; background:#13151f; flex-shrink:0;
    }
    .q-input {
      flex:1; font-size:14px; padding:10px 14px;
      border-radius:10px; border:1px solid #2d3147;
      background:#1a1d27; color:#e2e8f0; outline:none; font-family:inherit;
    }
    .q-input:focus { border-color:#4f6ef7; box-shadow:0 0 0 2px rgba(79,110,247,0.2); }
    .q-input::placeholder { color:#4b5563; }
    .send-btn {
      padding:10px 20px; border-radius:10px;
      background:linear-gradient(135deg,#4f6ef7,#8b5cf6);
      color:#fff; border:none; cursor:pointer;
      font-size:14px; font-weight:600; font-family:inherit;
      transition:opacity 0.15s;
    }
    .send-btn:hover  { opacity:0.88; }
    .send-btn:disabled { opacity:0.4; cursor:default; }
  </style>
</head>
<body>
<div class="app">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">📊</div>
      <div>
        <div class="topbar-title">Analytics Q&A Agent</div>
        <div class="topbar-sub">Gemini 1.5 Flash · SQLite · 61 000 rows · 2024</div>
      </div>
    </div>
    <span class="pill" id="status-pill">● Ready</span>
  </div>

  <!-- Chat feed -->
  <div class="feed" id="feed">
    <div class="msg agent">
      <div class="bubble">
        Hi! Ask me anything about your 2024 product data — users, sessions, revenue, retention. Try one of these:
        <div class="chips">
          <span class="chip" onclick="ask('What was our DAU last week?')">📈 DAU last week</span>
          <span class="chip" onclick="ask('Which cohort has the best D7 retention?')">🔁 D7 retention</span>
          <span class="chip" onclick="ask('How much revenue from US users?')">💰 US revenue</span>
          <span class="chip" onclick="ask('Compare sessions this week vs last week')">⚖️ Week comparison</span>
          <span class="chip" onclick="ask('What is our MAU for each month?')">📅 Monthly MAU</span>
          <span class="chip" onclick="ask('Who are the top users?')">❓ Ambiguous query</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-row">
    <input class="q-input" id="q-input" type="text"
           placeholder="Ask a question about your data…" autocomplete="off" />
    <button class="send-btn" id="send-btn" onclick="sendQuestion()">Ask →</button>
  </div>
</div>

<script>
// ── CONFIG — replace this URL after you deploy to Render ─────────────────────
// During local testing use: http://localhost:5050
// After Render deploy use:  https://YOUR-APP-NAME.onrender.com
const BACKEND_URL = "http://localhost:5050";
// ─────────────────────────────────────────────────────────────────────────────

const feed    = document.getElementById("feed");
const qInput  = document.getElementById("q-input");
const sendBtn = document.getElementById("send-btn");
const pill    = document.getElementById("status-pill");

let chartCount = 0;

qInput.addEventListener("keydown", e => { if (e.key === "Enter") sendQuestion(); });

function setStatus(text, type) {
  pill.textContent = "● " + text;
  pill.style.background = type === "busy"  ? "#2d1a00"
                        : type === "error" ? "#2d0f0f" : "#1a2e1a";
  pill.style.color      = type === "busy"  ? "#fbbf24"
                        : type === "error" ? "#f87171" : "#4ade80";
  pill.style.borderColor= type === "busy"  ? "#92400e"
                        : type === "error" ? "#7f1d1d" : "#166534";
}

function esc(s) {
  return String(s ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function scrollFeed() { feed.scrollTop = feed.scrollHeight; }

function addUserBubble(text) {
  const d = document.createElement("div");
  d.className = "msg user";
  d.innerHTML = `<div class="bubble">${esc(text)}</div>`;
  feed.appendChild(d); scrollFeed();
}

function addTyping() {
  const d = document.createElement("div");
  d.className = "msg agent"; d.id = "typing";
  d.innerHTML = `<div class="bubble" style="padding:12px 16px">
    <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>`;
  feed.appendChild(d); scrollFeed();
}
function removeTyping() { document.getElementById("typing")?.remove(); }

function toggleSQL(id) {
  const el  = document.getElementById(id);
  const btn = document.getElementById("btn-" + id);
  if (!el || !btn) return;
  const hidden = el.style.display === "none";
  el.style.display  = hidden ? "block" : "none";
  btn.textContent   = hidden ? "hide SQL ▲" : "show SQL ▼";
}

function buildChart(canvasId, rows, chartType, xCol, yCol) {
  if (!rows.length || !xCol || !yCol) return false;
  const hasX = Object.prototype.hasOwnProperty.call(rows[0], xCol);
  const hasY = Object.prototype.hasOwnProperty.call(rows[0], yCol);
  if (!hasX || !hasY) return false;

  const labels = rows.map(r => String(r[xCol]).substring(0, 10));
  const values = rows.map(r => parseFloat(r[yCol]) || 0);
  const type   = chartType === "line" ? "line" : "bar";

  new Chart(document.getElementById(canvasId), {
    type,
    data: {
      labels,
      datasets: [{
        label: yCol,
        data: values,
        backgroundColor: "rgba(79,110,247,0.6)",
        borderColor: "#4f6ef7",
        borderWidth: 1.5,
        tension: 0.35,
        fill: type === "line",
        pointRadius: 3
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          ticks: { color:"#6b7280", font:{size:10}, maxRotation:45, autoSkip:true, maxTicksLimit:12 },
          grid:  { color:"rgba(255,255,255,0.05)" }
        },
        y: {
          ticks: { color:"#6b7280", font:{size:10} },
          grid:  { color:"rgba(255,255,255,0.05)" }
        }
      }
    }
  });
  return true;
}

function buildTable(rows, cols) {
  if (!rows.length) return "";
  const display = rows.slice(0, 15);
  const th = cols.map(c => `<th>${esc(c)}</th>`).join("");
  const tb = display.map(r =>
    `<tr>${cols.map(c => `<td>${esc(r[c])}</td>`).join("")}</tr>`
  ).join("");
  return `<div class="tbl-wrap"><table><thead><tr>${th}</tr></thead><tbody>${tb}</tbody></table></div>`;
}

function renderAgentMsg(data) {
  const d = document.createElement("div");
  d.className = "msg agent";

  if (data._networkError) {
    d.innerHTML = `
      <div class="bubble">
        <span class="badge badge-err">Connection error</span><br><br>
        Could not reach the backend at <code>${BACKEND_URL}</code>.<br>
        Make sure the Flask server is running (<code>python api/server.py</code>)
        and the URL in index.html is correct.
      </div>`;
    feed.appendChild(d); scrollFeed(); return;
  }

  if (data.needs_clarification) {
    const cqs = (data.clarifying_questions || [])
      .map(q => `<div class="clarify-q">${esc(q)}</div>`).join("");
    d.innerHTML = `
      <div class="bubble">
        ${esc(data.answer || "I need more information.")}
        <div class="clarify">
          <div class="clarify-title">Please clarify:</div>
          ${cqs}
        </div>
      </div>
      <div class="meta"><span class="badge badge-type">ambiguous</span></div>`;
    feed.appendChild(d); scrollFeed(); return;
  }

  const sqlId   = "sql-" + (chartCount++);
  const chartId = "chart-" + chartCount;

  // Build SQL section
  const sqlSection = data.sql ? `
    <button class="sql-toggle" id="btn-${sqlId}" onclick="toggleSQL('${sqlId}')">show SQL ▼</button>
    <div class="sql-block" id="${sqlId}" style="display:none">${esc(data.sql)}</div>` : "";

  // Build chart or table
  let visualSection = "";
  const chart = data.chart || {};
  const canShowChart = chart.x && chart.y && (data.rows || []).length > 1;
  if (canShowChart) {
    visualSection = `<div class="chart-wrap"><canvas id="${chartId}"></canvas></div>`;
  } else if ((data.rows || []).length > 0) {
    visualSection = buildTable(data.rows, data.columns || []);
  }

  // Verification badge
  const v = data.verification || {};
  const verifyBadge = v.plausible === false
    ? `<span class="badge-warn">⚠ ${esc(v.concern || "check result")}</span>`
    : `<span class="badge-ok">✓ verified</span>`;

  d.innerHTML = `
    <div class="bubble">
      ${esc(data.answer || "(no answer)")}
      ${sqlSection}
      ${visualSection}
    </div>
    <div class="meta">
      ${data.type ? `<span class="badge badge-type">${esc(data.type)}</span>` : ""}
      ${verifyBadge}
      ${data.cached ? '<span class="badge badge-cache">cached ⚡</span>' : ""}
      <span>${data.elapsed_ms ?? 0} ms</span>
    </div>`;

  feed.appendChild(d); scrollFeed();

  // Render chart after element is in DOM
  if (canShowChart) {
    buildChart(chartId, data.rows, chart.type, chart.x, chart.y);
  }
}

async function sendQuestion() {
  const q = qInput.value.trim();
  if (!q) return;
  qInput.value = "";
  sendBtn.disabled = true;
  setStatus("Thinking…", "busy");

  addUserBubble(q);
  addTyping();

  try {
    const resp = await fetch(`${BACKEND_URL}/ask`, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ question: q })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: resp.statusText }));
      throw new Error(err.error || `HTTP ${resp.status}`);
    }

    const data = await resp.json();
    removeTyping();
    renderAgentMsg(data);
  } catch (err) {
    removeTyping();
    if (err.message.includes("Failed to fetch") || err.message.includes("NetworkError")) {
      renderAgentMsg({ _networkError: true });
    } else {
      const d = document.createElement("div");
      d.className = "msg agent";
      d.innerHTML = `<div class="bubble"><span class="badge badge-err">Error</span><br><br>${esc(err.message)}</div>`;
      feed.appendChild(d); scrollFeed();
    }
    setStatus("Error", "error");
    sendBtn.disabled = false;
    return;
  }

  setStatus("Ready", "ready");
  sendBtn.disabled = false;
}
</script>
</body>
</html>
